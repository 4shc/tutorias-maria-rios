<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    ul{
      list-style: none;
      padding: 2em;
      background-color: blueviolet;
      color: white;
      width: 350px;
      margin: auto;
      border-radius: .25em;
    }
    li{
      display: flex;
      gap: 1em;
      margin-bottom: .5em;
      justify-content: space-between;
    }
    input{
      border-radius: .25em;
      border: none;
    }
  </style>
</head>



<body>
  <h1>Tutorías María Ríos</h1>
  <ul>
    <li><span>Nombre:</span><input type="text"></li>
    <li><span>Edad:</span><input type="text"></li>
    <li><span>Correo:</span><input type="text"></li>
    <li><span>Contraseña:</span><input type="password"></li>
  </ul>
</body>



</html>
