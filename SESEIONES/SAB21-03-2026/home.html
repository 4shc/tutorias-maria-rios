<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fuente -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <title>Home</title>
</head>
<body>
  <div class="layout">


    <header>

      <div class="logo">
        <img class="img-logo" src="./img/logo.jpg" alt="Logo Dental Center">
      </div>

      <nav class="nav">
        <ul>
          <li class="enlace-activo">Inicio</li>
          <li><a href="./form-registro.html">Registro Usuarios</a></li>
          <li><a href="#">Tratamientos</a></li>
          <li><button class="btn-principal">Agendar cita</button></li>
        </ul>
      </nav>

    </header>


<main class="main">
  <div class="loginForm-container">
    <div class="loginForm">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <div class="loginForm-inputs">
          <input type="email" id="email" required placeholder="Correo">
          <input type="password" id="password" required placeholder="Contraseña">
          <div class="recuerdame"><input type="checkbox" name="" id=""> Recuérdame</div>
          <button class="btn-principal" type="submit">Iniciar sesión</button>
          <p>¿Olvidaste tu contraseña?</p>
          <p>¿Eres nuevo? <span class="btn-enlace" onclick="irRegistro()">Regístrate aquí</span></p>
        </div>
        
        
      </form>
    </div>
  </div>
</main>





    <footer></footer>

  </div>
  
  








  <script src="./js/script-registro.js"></script>
</body>
</html>
