<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
</head>
<body>

  <h1>Home</h1>
  <p id="bienvenida">Bienvenido</p>
 
  <button onclick="cerrarSesion()">Cerrar Sesión</button>

  <script>
    const user = JSON.parse(localStorage.getItem('userActivo'));

    if (user) {
      document.getElementById('bienvenida').textContent = 
        `Bienvenido ${user.name} 👋`;
    } else {
      // si no hay usuario → lo devuelves al login
      window.location.href = 'index.html';
    }

    cerrarSesion = () => {
      localStorage.removeItem('userActivo');
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
